server {
    listen 80;
    server_name hermes.automaton.neurenova.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hermes.automaton.neurenova.tech;

    ssl_certificate /etc/letsencrypt/live/automaton.neurenova.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/automaton.neurenova.tech/privkey.pem;

    location / {
        proxy_pass http://hermes-hci:10274;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket support for HCI real-time features
    location /ws {
        proxy_pass http://hermes-hci:10274;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hermes Gateway API (direct API access via /v1/)
    location /v1/ {
        proxy_pass http://hermes:8123/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
