services:
  # Reverse proxy + SSL
  nginx:
    image: nginx:alpine
    container_name: automaton_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx/sites:/etc/nginx/sites-enabled:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      n8n:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - automaton_network

  # Certbot for Let's Encrypt
  certbot:
    image: certbot/certbot:latest
    container_name: automaton_certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - automaton_network

  # n8n orchestrator
  n8n:
    image: n8nio/n8n:latest
    container_name: automaton_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:?N8N_DB_PASSWORD is required}
      - DOMAIN=${DOMAIN}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      - N8N_HOST=${N8N_HOST:-n8n.${DOMAIN}}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - WEBHOOK_URL=https://n8n.${DOMAIN}/
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Paris}
      - TZ=${TIMEZONE:-Europe/Paris}
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./projects:/home/node/projects
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - postgres
      - redis
    networks:
      - automaton_network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: automaton_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-automaton}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - automaton_network

  # Redis queue
  redis:
    image: redis:7-alpine
    container_name: automaton_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - automaton_network

  # API métier (BullMQ + FFmpeg triggers + upload helpers)
  api:
    build: ./services/api
    container_name: automaton_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-automaton}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUNO_API_KEY=${SUNO_API_KEY}
      - LEONARDO_API_KEY=${LEONARDO_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - ./projects:/app/projects
    depends_on:
      - redis
      - postgres
    networks:
      - automaton_network

  # FFmpeg worker
  ffmpeg-worker:
    build: ./services/ffmpeg-worker
    container_name: automaton_ffmpeg_worker
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - PROJECTS_DIR=/app/projects
    volumes:
      - ./projects:/app/projects
    depends_on:
      - redis
    networks:
      - automaton_network
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  automaton_network:
    driver: bridge
